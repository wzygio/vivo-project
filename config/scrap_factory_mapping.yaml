# ==============================================================================
# 报废站点 → 厂别映射配置
# ==============================================================================
# 说明：
# - 报废数据中只有"五位站点代码"，没有厂别字段
# - 本配置用于将站点代码映射到厂别（ARRAY / OLED / TP）
# - 优先级：精确匹配 > 前缀推断
# ==============================================================================

# 默认前缀推断规则（当精确匹配未命中时使用）
default_prefix_rules:
  A: ARRAY
  O: OLED
  T: TP

# 精确映射表（优先级高于前缀推断）
# 格式：站点代码: 厂别
mappings:
  # 示例（请根据实际站点代码录入）
  # A0001: ARRAY
  # A0002: ARRAY
  # T0101: TP
  # T0102: TP

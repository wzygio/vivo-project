# config.yaml
# 这是我们项目的主配置文件

# 应用程序级别的设置
application:
  cache_ttl_hours: 4

# 数据加载相关的参数
data_source:
  product_code: "M678"
  work_order_types:
    - "ESLC"
    - "P"
    - "LCFG"
    - "SLCFG"
    - "SYZLC"

# 数据处理相关的参数
processing:
  target_defect_groups:
    - "Array_Line"
    - "Array_Pixel"
    - "OLED_Mura"

  defect_multipliers:
    '彩斑Mura': 0.15
    'G彩短条Mura': 0.15
    'S向棱形彩色带状Mura': 0.05

  mapping_hotspot_script:
    
    # 脚本 1: (你现有的规则)
    - enable: true
      target_code: '彩斑Mura'
      target_batch_index: 'oldest'
      mode: 'additive' 
      hotspot_adder: 40
      normal_multiplier_in_add_mode: 0.2
      hotspot_rules:
        - { 
            type: 'position', 
            value: [
              ['1E', 'F0'], ['2A', 'F0'], ['2B', 'F0'], ['2C', 'F0'],
              ['2D', 'F0'], ['2E', 'F0'], ['1E', 'M0'], ['1E', 'N0'],
              ['1C', 'R0'], ['1E', 'R0']
            ] 
          }

    

    - enable: true
      target_code: 'S向单暗线'       # <--- 不同的Code
      target_batch_index: 'oldest'    # <--- 不同的批次
      mode: 'multiplicative'          # <--- 不同的模式
      hotspot_multiplier: 1.3
      normal_multiplier: 0.7
      hotspot_rules:
        - { type: 'row', value: ['2E', '1A'] } # 示例：高亮第一列和最后一列
        - { type: 'col', value: ['A0', 'B0', 'S0'] } # 示例：高亮第一列和最后一列
    
    - enable: true
      target_code: 'PCD裂纹亮线'       # <--- 不同的Code
      target_batch_index: 'oldest'    # <--- 不同的批次
      mode: 'additive'          # <--- 不同的模式
      hotspot_adder: 3
      normal_multiplier_in_add_mode: 10
      hotspot_rules:
        - { type: 'row', value: ['2E', '1A'] } # 示例：高亮第一列和最后一列
        - { type: 'col', value: ['A0', 'B0', 'S0'] } # 示例：高亮第一列和最后一列

    - enable: true
      target_code: 'G3亮点'       # <--- 不同的Code
      target_batch_index: 'oldest'    # <--- 不同的批次
      mode: 'additive'          # <--- 不同的模式
      hotspot_adder: 10
      normal_multiplier_in_add_mode: 0.8
      hotspot_rules:
        - { type: 'row', value: ['2E', '1A'] } # 示例：高亮第一列和最后一列
        - { type: 'col', value: ['A0', 'B0', 'R0'] } # 示例：高亮第一列和最后一列

    - enable: true
      target_code: '群亮点'       # <--- 不同的Code
      target_batch_index: 'oldest'    # <--- 不同的批次
      mode: 'additive'          # <--- 不同的模式
      hotspot_adder: 5
      normal_multiplier_in_add_mode: 0.8
      hotspot_rules:
        - { type: 'row', value: ['2E', '1A'] } # 示例：高亮第一列和最后一列
        - { type: 'col', value: ['A0', 'B0', 'R0', 'S0'] } # 示例：高亮第一列和最后一列

    - enable: true
      target_code: '大面积亮点'       # <--- 不同的Code
      target_batch_index: 'oldest'    # <--- 不同的批次
      mode: 'additive'          # <--- 不同的模式
      hotspot_adder: 5
      normal_multiplier_in_add_mode: 3
      hotspot_rules:
        - { type: 'row', value: ['2E', '1A'] } # 示例：高亮第一列和最后一列
        - { type: 'col', value: ['A0', 'B0', 'R0', 'S0'] } # 示例：高亮第一列和最后一列
        - { 
            type: 'position', 
            value: [
              ['1E', 'F0'], ['2A', 'F0'], ['2B', 'F0'], ['2C', 'F0'],
              ['2D', 'F0'], ['2E', 'F0'], ['1E', 'M0'], ['1E', 'N0'],
              ['1C', 'R0'], ['1E', 'R0']
            ] 
          }

    - enable: true
      target_code: 'B暗点'       # <--- 不同的Code
      target_batch_index: 'oldest'    # <--- 不同的批次
      mode: 'additive'          # <--- 不同的模式
      hotspot_adder: 5
      normal_multiplier_in_add_mode: 0.5
      hotspot_rules:
        - { type: 'row', value: ['2E', '1A'] } # 示例：高亮第一列和最后一列
        - { type: 'col', value: ['A0', 'B0', 'R0', 'S0'] } # 示例：高亮第一列和最后一列

    - enable: true
      target_code: '可修复暗点'       # <--- 不同的Code
      target_batch_index: 'oldest'    # <--- 不同的批次
      mode: 'additive'          # <--- 不同的模式
      hotspot_adder: 5
      normal_multiplier_in_add_mode: 0.5
      hotspot_rules:
        - { type: 'row', value: ['2E', '1A'] } # 示例：高亮第一列和最后一列
        - { type: 'col', value: ['A0', 'B0', 'R0', 'S0'] } # 示例：高亮第一列和最后一列


  'sheet_hotspot_config': {
      'enable': True,
      'random_seed': 2025,
      
      'hide_hotspot_config': {
          # --- [核心修改] 分别定义 Sheet 和 Lot 的波动幅度 ---
          'fluctuation_sheet': 0.5,  
          'fluctuation_lot': 0.3,
      },
  }

  rate_override_config:
    override_file: "override_rates.xlsx"
    override_sheet_name: "Overrides"

  dispersion_config: {
      'enable': True,
      
      # 1. 默认权重 (您提到的 [1:1:...] 逻辑)
      'default_lot_weight': 1,
      'default_sheet_weight': 1,
      
      # 2. 您要的“接口”：为特定Code指定Lot/Sheet的权重
      'code_specific_lot_weights': {
          'S向亮线': {
              'L3MR58E38': 10, # <--- 将这个Lot的权重设为10
          }
      },

      'code_specific_sheet_weights': {
            'PCD裂纹亮线': {
              'L3MR57E1J16': 20
            }
      },
      
      # 3. 随机种子 "盐"，用于确保可复现性；字符串可以通过哈希函数转换为数字
      'random_seed_salt': "vivo_project_2025"
    }

logging:
  file_name: "app.log"

# UI界面相关的配置
ui:
  icons:
    home: "🏠"
    dashboard: "📊"
    chart_up: "📈"
    chart_down: "📉"
    report: "📋"
    datasheet: "📄"
    arrow_right: "➡️"
    rocket: "🚀"
    refresh: "🔄"
    settings: "⚙️"
    success: "✅"
    error: "❌"
    warning: "⚠️"
    info: "ℹ️"

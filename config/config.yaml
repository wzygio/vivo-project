# 应用程序级别的设置
application:
  cache_ttl_hours: 4 # 缓存时间（小时）

# 数据加载相关的参数
data_source:
  product_code: "M678"

  # 4. defect_group
  target_defect_groups:
    - "Array_Line"
    - "Array_Pixel"
    - "OLED_Mura"
    
  work_order_types:
    - "ESLC" # 量产
    - "P" # 量产
    - "LCFG" # 量产返工
    - "SLCFG" # 试量产返工
    - "SYZLC" # 实验转量产

# 本地文件读取
paths:
  static_warning_lines: 
    file_name: 'M678入库不良率规格-old.xlsx'
    sheet_name: 'M678入库不良率规格'  

  benchmark_report_config: 
    file_name: 'V3良率及不良率By批次汇总报表.xlsx'
    sheet_name: 'CT'

  rate_override_config:
    override_file: "override_rates.xlsx"
    override_sheet_name: "Overrides"

# 数据处理相关的参数
processing:
  use_local_snapshot: True
  snapshot_path: 'data/panel_details_snapshot.parquet'
  
  defect_capping:
    enable: True

  # 1. Group 级修正配置
  group_monthly_values:
    Array_Line:
      '2025-10': 0.0117
      '2025-11': 0.0105
      '2025-12': 0.0099
      '2026-01': 0.0103
    Array_Pixel:
      '2025-10': 0.0110
      '2025-11': 0.0101
      '2025-12': 0.0091
      '2026-01': 0.0091
    OLED_Mura:
      '2025-10': 0.0018
      '2025-11': 0.0017
      '2025-12': 0.0012
      '2026-01': 0.0013

  group_weekly_values:
    Array_Line:
      '2025-W02': 0.01
    Array_Pixel:
      '2025-W02': 0.022
    OLED_Mura:
      '2025-W02': 0.0016

  # 2. Code 级修正配置
  code_monthly_values:

  code_weekly_values:
  
  # 3. lot阵列投入时间
  array_input_time:
    custom_times:
      # 高发sheet_id：共计 5 个
      L3MR58E5C08: '20250805'
      L3MR58E5C03: '20250805' 
      L3MR58E5C10: '20250805'
      L3MR58E5C26: '20250805'
      L3MR58E5C04: '20250805'

  # 5. defect_code倍率调节
  defect_multipliers:
    '暗点': 0.7
    '彩斑Mura': 0.3

  # 6. Mapping集中性调节
  mapping_hotspot_script:
    - enable: true
      target_code: '彩斑Mura'
      target_batch_index: 'oldest'
      mode: 'additive' 
      hotspot_adder: 40
      normal_multiplier_in_add_mode: 0.2
      hotspot_rules:
        - { 
            type: 'position', 
            value: [
              ['1E', 'F0'], ['2A', 'F0'], ['2B', 'F0'], ['2C', 'F0'],
              ['2D', 'F0'], ['2E', 'F0'], ['1E', 'M0'], ['1E', 'N0'],
              ['1C', 'R0'], ['1E', 'R0']
            ] 
          }

    - enable: true
      target_code: 'S向单暗线'       
      target_batch_index: 'oldest'    
      mode: 'multiplicative'          
      hotspot_multiplier: 1.3
      normal_multiplier: 0.7
      hotspot_rules:
        - { type: 'row', value: ['2E', '1A'] }
        - { type: 'col', value: ['A0', 'B0', 'S0'] }

  sheet_hotspot_config: 
      enable: True
      random_seed: 2025
      hide_hotspot_config: {
          'fluctuation_sheet': 0.3,  
          'fluctuation_lot': 0.2,
      }

# UI界面相关的配置
ui:
  icons:
    home: "🏠"
    dashboard: "📊"
    chart_up: "📈"
    chart_down: "📉"
    report: "📋"
    datasheet: "📄"
    arrow_right: "➡️"
    rocket: "🚀"
    refresh: "🔄"
    settings: "⚙️"
    success: "✅"
    error: "❌"
    warning: "⚠️"
    info: "ℹ️"

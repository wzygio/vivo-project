# config.yaml
# 这是我们项目的主配置文件

# 应用程序级别的设置
application:
  cache_ttl_hours: 4

# 数据加载相关的参数
data_source:
  product_code: "M678"
  work_order_types:
    - "ESLC"
    - "P"
    - "LCFG"
    - "SLCFG"
    - "SYZLC"

paths:
  static_warning_lines: {
    'file_name': 'M678入库不良率规格-old.xlsx',
    'sheet_name': 'M678入库不良率规格'
  }
  benchmark_report_config: {
    'file_name': 'V3良率及不良率By批次汇总报表.xlsx',
    'sheet_name': 'CT'
  }

# 数据处理相关的参数
processing:
  use_local_snapshot: True
  snapshot_path: 'data/panel_details_snapshot.parquet'
  
  defect_capping:
    enable: True

  # 1. Group 级修正配置
  group_monthly_values:
    Array_Line:
      '2025-10': 0.0117
      '2025-11': 0.0105
      '2025-12': 0.0099
      '2026-01': 0.0103
    Array_Pixel:
      '2025-10': 0.0110
      '2025-11': 0.0101
      '2025-12': 0.0091
      '2026-01': 0.0093
    OLED_Mura:
      '2025-10': 0.0018
      '2025-11': 0.0017
      '2025-12': 0.0012
      '2026-01': 0.0015

  group_weekly_values:
    Array_Line:
      '2026-W01': 0.0107
    Array_Pixel:
      '2026-W01': 0.0105
    OLED_Mura:
      '2026-W01': 0.0015

  # 2. Code 级修正配置
  code_monthly_values:
    'G3亮点':
      '2025-11': 0.0029
    '群暗点':
      '2026-01': 0.0035
    '暗点':
      '2026-01': 0.0015
      
    '彩斑Mura':
      '2025-10': 0.0017
      '2025-11': 0.0015
    'G彩短条Mura':
      '2025-09': 0.0030
      '2025-10': 0.0010

  code_weekly_values:
    '群暗点':
      '2026-W01': 0.0032
    '暗点':
      '2026-W01': 0.0015
    
    
  array_input_time:
    custom_times:
      # 高发sheet_id：共计 5 个
      L3MR58E5C08: '20250805'
      L3MR58E5C03: '20250805' 
      L3MR58E5C10: '20250805'
      L3MR58E5C26: '20250805'
      L3MR58E5C04: '20250805'

  target_defect_groups:
    - "Array_Line"
    - "Array_Pixel"
    - "OLED_Mura"

  defect_multipliers:
    '暗点': 0.8
    '彩斑Mura': 0.3

  mapping_hotspot_script:
    - enable: true
      target_code: '彩斑Mura'
      target_batch_index: 'oldest'
      mode: 'additive' 
      hotspot_adder: 40
      normal_multiplier_in_add_mode: 0.2
      hotspot_rules:
        - { 
            type: 'position', 
            value: [
              ['1E', 'F0'], ['2A', 'F0'], ['2B', 'F0'], ['2C', 'F0'],
              ['2D', 'F0'], ['2E', 'F0'], ['1E', 'M0'], ['1E', 'N0'],
              ['1C', 'R0'], ['1E', 'R0']
            ] 
          }

    - enable: true
      target_code: 'S向单暗线'       
      target_batch_index: 'oldest'    
      mode: 'multiplicative'          
      hotspot_multiplier: 1.3
      normal_multiplier: 0.7
      hotspot_rules:
        - { type: 'row', value: ['2E', '1A'] }
        - { type: 'col', value: ['A0', 'B0', 'S0'] } 
    
    - enable: true
      target_code: 'PCD裂纹亮线'       
      target_batch_index: 'oldest'    
      mode: 'additive'          
      hotspot_adder: 3
      normal_multiplier_in_add_mode: 10
      hotspot_rules:
        - { type: 'row', value: ['2E', '1A'] } 
        - { type: 'col', value: ['A0', 'B0', 'S0'] } 

    - enable: true
      target_code: 'G3亮点'       
      target_batch_index: 'oldest'    
      mode: 'additive'          
      hotspot_adder: 10
      normal_multiplier_in_add_mode: 0.8
      hotspot_rules:
        - { type: 'row', value: ['2E', '1A'] } 
        - { type: 'col', value: ['A0', 'B0', 'R0'] } 

    - enable: true
      target_code: '群亮点'       
      target_batch_index: 'oldest'    
      mode: 'additive'          
      hotspot_adder: 5
      normal_multiplier_in_add_mode: 0.8
      hotspot_rules:
        - { type: 'row', value: ['2E', '1A'] } 
        - { type: 'col', value: ['A0', 'B0', 'R0', 'S0'] } 

    - enable: true
      target_code: '大面积亮点'       
      target_batch_index: 'oldest'    
      mode: 'additive'          
      hotspot_adder: 5
      normal_multiplier_in_add_mode: 3
      hotspot_rules:
        - { type: 'row', value: ['2E', '1A'] }
        - { type: 'col', value: ['A0', 'B0', 'R0', 'S0'] } 
        - { 
            type: 'position', 
            value: [
              ['1E', 'F0'], ['2A', 'F0'], ['2B', 'F0'], ['2C', 'F0'],
              ['2D', 'F0'], ['2E', 'F0'], ['1E', 'M0'], ['1E', 'N0'],
              ['1C', 'R0'], ['1E', 'R0']
            ] 
          }

    - enable: true
      target_code: 'B暗点'       
      target_batch_index: 'oldest'    
      mode: 'additive'          
      hotspot_adder: 5
      normal_multiplier_in_add_mode: 0.5
      hotspot_rules:
        - { type: 'row', value: ['2E', '1A'] } 
        - { type: 'col', value: ['A0', 'B0', 'R0', 'S0'] } 

    - enable: true
      target_code: '可修复暗点'       
      target_batch_index: 'oldest'    
      mode: 'additive'          
      hotspot_adder: 5
      normal_multiplier_in_add_mode: 0.5
      hotspot_rules:
        - { type: 'row', value: ['2E', '1A'] } 
        - { type: 'col', value: ['A0', 'B0', 'R0', 'S0'] } 


  sheet_hotspot_config: {
      enable: True,
      random_seed: 2025,
      
      hide_hotspot_config: {
          'fluctuation_sheet': 0.5,  
          'fluctuation_lot': 0.3,
      },
  }

  rate_override_config:
    override_file: "override_rates.xlsx"
    override_sheet_name: "Overrides"


# UI界面相关的配置
ui:
  icons:
    home: "🏠"
    dashboard: "📊"
    chart_up: "📈"
    chart_down: "📉"
    report: "📋"
    datasheet: "📄"
    arrow_right: "➡️"
    rocket: "🚀"
    refresh: "🔄"
    settings: "⚙️"
    success: "✅"
    error: "❌"
    warning: "⚠️"
    info: "ℹ️"

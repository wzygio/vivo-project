# ==============================================================================
# 数据修饰配置文件 (Compliance Configuration)
# ==============================================================================
# 说明：
# - 此文件用于控制"监控类型-产品型号-厂别"组合的报警数据修饰开关
# - 值为 true 表示显示修饰后的合规数据（所有报警变为 OK）
# - 值为 false 表示显示真实原始数据
# - 修改此文件后，刷新页面即可生效
# ==============================================================================

# 全局开关
default: false

# 精细化配置（优先级高于 default）
# 格式：{监控类型}-{产品型号}-{厂别}
rules:
  # 示例配置（请根据实际需求修改）
  AOI-M626-TP: false
  AOI-M678-TP: false

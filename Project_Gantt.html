<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>企业级矩阵式甘特图 - V3报表项目</title>
    <style>
        /* ==========================================
         * 核心变量与大厂汇报风配色 (参考图一)
         * ========================================== */
        :root {
            --color-header-bg: #4F81BD;
            --color-header-text: #FFFFFF;
            --color-cell-border: #A6A6A6;
            --color-plan-row: #F2F2F2;
            --color-actual-row: #FFFFFF;
            --color-bar-plan: #B4C6E7;
            --color-bar-actual: #92D050;
            --color-bar-delay: #FFC000;
            --color-today-line: #FF0000;
            --font-family: 'Microsoft YaHei', 'SimHei', sans-serif;
            --cell-width: 65px; /* [重构] 增加单一网格宽度以容纳 "W01" 文本，26周总宽约 910px，完美适配 PPT */
        }

        body {
            font-family: var(--font-family);
            margin: 0;
            padding: 20px;
            background-color: #FFFFFF;
            font-size: 12px;
            color: #000000;
        }

        /* ==========================================
         * 顶部宏观里程碑时间轴 (Top Milestone Axis)
         * ========================================== */
        .macro-timeline {
            position: relative;
            margin-bottom: 20px;
            padding-top: 40px;
            padding-bottom: 20px;
            padding-left: 300px; /* 让出左侧表格表头的宽度 */
        }
        
        .macro-line {
            height: 4px;
            background-color: #D9D9D9;
            width: 100%;
            position: relative;
        }

        .macro-point {
            position: absolute;
            top: -6px;
            width: 16px;
            height: 16px;
            background-color: #A6A6A6;
            border-radius: 50%;
            transform: translateX(-50%);
            z-index: 2;
        }
        
        .macro-point.active { background-color: #00B050; }
        .macro-point.current { background-color: #FF0000; }

        .macro-label {
            position: absolute;
            top: -40px;
            transform: translateX(-50%);
            text-align: center;
            font-weight: bold;
            font-size: 13px;
            white-space: nowrap;
        }

        .macro-date {
            position: absolute;
            top: 20px;
            transform: translateX(-50%);
            font-size: 12px;
            color: #595959;
        }

        /* ==========================================
         * 矩阵式甘特图表格容器 (Matrix Table)
         * ========================================== */
        .table-wrapper {
            width: 100%;
            overflow-x: auto; /* 允许横向滚动 */
            position: relative;
            border: 2px solid var(--color-header-bg); /* 外边框加粗 */
        }

        table {
            border-collapse: collapse;
            width: max-content; /* 强制表格根据内容撑开 */
            table-layout: fixed;
        }

        th, td {
            border: 1px solid var(--color-cell-border);
            text-align: center;
            vertical-align: middle;
            height: 24px; /* 紧凑行高 */
            box-sizing: border-box;
            padding: 2px 4px;
        }

        /* 表头样式 */
        thead th {
            background-color: var(--color-header-bg);
            color: var(--color-header-text);
            font-weight: bold;
            font-size: 12px;
        }

        /* 左侧固定列区域的基础样式 */
        .col-phase { width: 80px; background-color: #4A78B0; color: white; font-weight: bold; }
        .col-milestone { width: 120px; background-color: #4A78B0; color: white; font-weight: bold; }
        .col-task { width: 160px; background-color: #4A78B0; color: white; font-weight: bold; }
        .col-type { width: 40px; background-color: #D9E1F2; color: black; font-weight: bold; }

        /* 时间网格列基础样式 */
        .time-cell {
            width: var(--cell-width);
            min-width: var(--cell-width);
            max-width: var(--cell-width);
            padding: 0;
            position: relative; /* [重构] 开启相对定位，确保背景渐变能精准对齐 */
        }

        /* 双轨行底色区分 (作为渐变图层下的默认底色) */
        tr.row-plan td.time-cell { background-color: var(--color-plan-row); }
        tr.row-actual td.time-cell { background-color: var(--color-actual-row); }

        /* 任务填充色块 (模仿 Excel 填色) */
        .fill-plan { background-color: var(--color-bar-plan) !important; }
        .fill-actual-done { background-color: var(--color-bar-actual) !important; }
        .fill-actual-progress { background-color: var(--color-bar-delay) !important; }

        /* 跨行合并的左侧单元格背景覆盖 */
        td.col-phase, td.col-milestone, td.col-task {
            background-color: #5B9BD5; /* 略浅的蓝色用于行主体 */
            color: white;
            border-bottom: 1px solid white; /* 白色内部分割线显得更高级 */
            border-right: 1px solid white;
        }

        /* ==========================================
         * 贯穿红线与红旗 (Today Marker)
         * ========================================== */
        #today-line {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 2px;
            background-color: var(--color-today-line);
            z-index: 10;
            pointer-events: none; /* 防止遮挡点击 */
        }
        
        .red-flag {
            position: absolute;
            top: 80px; /* 挂在表头下方 */
            left: -14px; /* 居中偏移 */
            width: 0; 
            height: 0; 
            border-top: 10px solid transparent;
            border-bottom: 10px solid transparent;
            border-left: 20px solid var(--color-today-line);
        }

        .flag-pole {
            position: absolute;
            top: 80px;
            left: -2px;
            width: 4px;
            height: 30px;
            background-color: var(--color-today-line);
        }
        
        /* 浮动说明框 (卡点/需求框) */
        .callout-box {
            position: absolute;
            top: 120px;
            left: 10px;
            background-color: white;
            border: 2px solid #0000FF;
            padding: 8px;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.2);
            font-weight: bold;
            z-index: 11;
            width: 250px;
        }

    </style>
</head>
<body>

    <div class="macro-timeline" id="macro-timeline">
        <div class="macro-line">
            <div class="macro-point active" style="left: 0%;"><div class="macro-label">项目启动<br/><span style="font-weight:normal;font-size:11px;">1.项目团队组建</span></div><div class="macro-date">12/1</div></div>
            <div class="macro-point active" style="left: 15%;"><div class="macro-label">需求分析和设计<br/><span style="font-weight:normal;font-size:11px;">1.业务需求调研</span></div><div class="macro-date">1/1</div></div>
            <div class="macro-point active" style="left: 45%;"><div class="macro-label">V0.1研发<br/><span style="font-weight:normal;font-size:11px;">1.软件基础框架搭建</span></div><div class="macro-date">3/1</div></div>
            <div class="macro-point current" style="left: 60%;"><div class="macro-label">V0.2研发<br/><span style="font-weight:normal;font-size:11px;">1.系统核心功能上线</span></div><div class="macro-date">4/3</div></div>
            <div class="macro-point" style="left: 80%;"><div class="macro-label">V0.3研发<br/><span style="font-weight:normal;font-size:11px;">1.系统全部功能上线</span></div><div class="macro-date">7/3</div></div>
            <div class="macro-point" style="left: 100%;"><div class="macro-label">系统上线投产<br/><span style="font-weight:normal;font-size:11px;">1.系统验收</span></div><div class="macro-date">9/30</div></div>
        </div>
    </div>

    <div class="table-wrapper" id="gantt-wrapper">
        <table id="gantt-table">
            <thead id="gantt-thead">
                </thead>
            <tbody id="gantt-tbody">
                </tbody>
        </table>
        
        <div id="today-line">
            <div class="flag-pole"></div>
            <div class="red-flag"></div>
            <div class="callout-box">
                当前汇报节点 (3/19):<br/>
                <span style="font-weight:normal; color:#555;">模组库存数据捞取较复杂，已与模组厂PMC沟通库存数据逻辑。</span>
            </div>
        </div>
    </div>

<script>
    /* ==========================================
     * TDD & DDD: 领域数据重构 (支持计划与实际双轨)
     * ========================================== */
    const rawData = [
        // 阶段一：需求分析与设计
        { phase: "需求分析与设计", milestone: "业务需求调研", task: "V1逻辑与报表类型", planStart: "2025-12-01", planEnd: "2025-12-12", actualStart: "2025-12-01", actualEnd: "2025-12-12", status: "done" },
        { phase: "需求分析与设计", milestone: "各厂别业务逻辑梳理", task: "Array状态梳理", planStart: "2025-12-12", planEnd: "2025-12-20", actualStart: "2025-12-12", actualEnd: "2025-12-20", status: "done" },
        { phase: "需求分析与设计", milestone: "各厂别业务逻辑梳理", task: "OLED状态梳理", planStart: "2025-12-20", planEnd: "2025-12-29", actualStart: "2025-12-20", actualEnd: "2025-12-29", status: "done" },
        { phase: "需求分析与设计", milestone: "各厂别业务逻辑梳理", task: "TP状态梳理", planStart: "2025-12-29", planEnd: "2026-01-09", actualStart: "2025-12-29", actualEnd: "2026-01-09", status: "done" },
        { phase: "需求分析与设计", milestone: "各厂别业务逻辑梳理", task: "屏体状态梳理", planStart: "2026-01-09", planEnd: "2026-01-16", actualStart: "2026-01-09", actualEnd: "2026-01-16", status: "done" },
        { phase: "需求分析与设计", milestone: "各厂别业务逻辑梳理", task: "M3/M4状态梳理", planStart: "2026-01-16", planEnd: "2026-01-30", actualStart: "2026-01-16", actualEnd: "2026-01-30", status: "done" },
        { phase: "需求分析与设计", milestone: "项目计划拟订", task: "业务场景确定", planStart: "2026-01-30", planEnd: "2026-02-03", actualStart: "2026-01-30", actualEnd: "2026-02-03", status: "done" },
        { phase: "需求分析与设计", milestone: "项目计划拟订", task: "任务节点确定", planStart: "2026-02-03", planEnd: "2026-02-06", actualStart: "2026-02-03", actualEnd: "2026-02-06", status: "done" },
        { phase: "需求分析与设计", milestone: "报表样式设计", task: "报表框架确定", planStart: "2026-02-06", planEnd: "2026-02-10", actualStart: "2026-02-06", actualEnd: "2026-02-10", status: "done" },
        
        // 阶段二：报表开发 (开始出现并行与滞后模拟)
        { phase: "报表开发", milestone: "V3全口径出货统计", task: "底层数据表建立", planStart: "2026-02-10", planEnd: "2026-03-17", actualStart: "2026-02-15", actualEnd: null, status: "progress" }, // 实际进度未结束 (滞后模拟)
        { phase: "报表开发", milestone: "V3全口径出货统计", task: "底层数据捞取测试", planStart: "2026-03-17", planEnd: "2026-03-24", actualStart: null, actualEnd: null, status: "pending" },
        { phase: "报表开发", milestone: "V3全口径出货统计", task: "汇总表及界面开发", planStart: "2026-03-24", planEnd: "2026-03-31", actualStart: null, actualEnd: null, status: "pending" },
        
        { phase: "报表开发", milestone: "V3前段良率统计", task: "报表界面开发", planStart: "2026-03-31", planEnd: "2026-04-20", actualStart: null, actualEnd: null, status: "pending" },
        { phase: "报表开发", milestone: "V3前段良率统计", task: "报表测试上线", planStart: "2026-04-20", planEnd: "2026-04-30", actualStart: null, actualEnd: null, status: "pending" },
        
        { phase: "报表开发", milestone: "V3产品模组良率", task: "报表界面开发", planStart: "2026-03-31", planEnd: "2026-04-20", actualStart: null, actualEnd: null, status: "pending" },
        { phase: "报表开发", milestone: "V3产品模组良率", task: "报表测试上线", planStart: "2026-04-20", planEnd: "2026-04-30", actualStart: null, actualEnd: null, status: "pending" },
        
        { phase: "报表开发", milestone: "V3全口径汇总", task: "报表界面开发", planStart: "2026-04-30", planEnd: "2026-05-20", actualStart: null, actualEnd: null, status: "pending" },
        { phase: "报表开发", milestone: "V3全口径汇总", task: "报表测试上线", planStart: "2026-05-20", planEnd: "2026-05-30", actualStart: null, actualEnd: null, status: "pending" }
    ];

    /* ==========================================
     * 引擎层重构：SOTA 方案 B (周网格 + 亚单元格精度渲染)
     * ========================================== */
    const GANTT_START = new Date("2025-12-01"); // 项目起点 (正好是周一) // Project start date (Monday)
    const GANTT_END = new Date("2026-05-31");   // 项目终点 (正好是周日) // Project end date (Sunday)
    const TODAY = new Date("2026-03-19");       // 当前汇报节点 // Current reporting node (Today)

    // 核心算法：生成周级别的时间轴切片 // Core algorithm: Generate weekly timeline slices
    function generateWeeks() {
        let weeks = []; // 初始化周数组 // Initialize weeks array
        let curr = new Date(GANTT_START); // 从起点开始迭代 // Iterate from start date
        let weekNum = 1; // 相对周序号 // Relative week number
        
        while (curr <= GANTT_END) { // 当未越界时 // While within bounds
            let weekStart = new Date(curr); // 当前周一 // Current Monday
            let weekEnd = new Date(curr); // 当前周日 // Current Sunday
            weekEnd.setDate(weekEnd.getDate() + 6); // 周一加 6 天等于周日 // Add 6 days to get Sunday
            
            weeks.push({ // 将领域数据推入数组 // Push domain data to array
                start: weekStart, // 记录周开始时间戳 // Record week start
                end: weekEnd, // 记录周结束时间戳 // Record week end
                label: 'W' + String(weekNum).padStart(2, '0'), // 生成 "W01" 格式文本 // Generate "W01" label
                month: weekEnd.getMonth() // 用周日所在的月份作为该周的归属月 (处理跨月逻辑) // Use Sunday's month for跨月
            });
            curr.setDate(curr.getDate() + 7); // 步进到下一个周一 // Step to next Monday
            weekNum++; // 周序号递增 // Increment week number
        }
        return weeks; // 返回清洗后的周数据模型 // Return cleaned weekly models
    }

    const weeklyGrid = generateWeeks(); // 实例化周网格数据 // Instantiate weekly grid

    // 魔法算法：计算单任务在单周内的精确重叠百分比 (Sub-cell rendering) // Magic: Calculate exact overlap percentage for a task within a week
    function getOverlapStyle(taskStartStr, taskEndStr, weekData, barColor, isActualProgress) {
        if (!taskStartStr) return ''; // 如果没有开始时间则直接跳过 // Skip if no start date
        
        const tStart = new Date(taskStartStr).getTime(); // 任务起始时间戳 // Task start timestamp
        // 如果是实际进度且没有结束时间，意味着“进行中/滞后”，填色渲染到 TODAY // If actual & ongoing, fill up to TODAY
        const tEnd = taskEndStr ? new Date(taskEndStr).getTime() : (isActualProgress ? TODAY.getTime() : 0); 
        
        const wStart = weekData.start.getTime(); // 周起始时间戳 (周一 00:00:00) // Week start timestamp
        const weekDuration = 7 * 24 * 60 * 60 * 1000; // 一周的绝对毫秒跨度 // Exact absolute milliseconds in a week
        const wEndExclusive = wStart + weekDuration; // 周绝对边界 (下周一 00:00:00) // Exclusive week boundary

        if (tEnd < wStart || tStart >= wEndExclusive || tEnd === 0) return ''; // 无任何交集，不渲染 // No intersection, return empty

        let startPct = 0; // 默认从单元格最左侧 (0%) 开始渲染 // Default start at 0%
        if (tStart > wStart) { // 如果任务在周中才开始 // If task starts mid-week
            startPct = ((tStart - wStart) / weekDuration) * 100; // 精确计算起始百分比 // Calculate exact start %
        }

        let endPct = 100; // 默认渲染到单元格最右侧 (100%) // Default end at 100%
        if (tEnd < wEndExclusive) { // 如果任务在周中结束 // If task ends mid-week
            // +1 天是为了包含该天 (因为 tEnd 是当天的 00:00，必须加 24 小时才能覆盖全天) // Add 1 day to cover the full end day
            endPct = ((tEnd + 24*60*60*1000 - wStart) / weekDuration) * 100; 
        }

        endPct = Math.min(100, endPct); // 边界防御，防止溢出 100% // Boundary defense, prevent > 100%

        if (startPct === 0 && endPct >= 100) { // 如果完全贯穿该周 // If it fully spans the week
            return `background-color: ${barColor};`; // 直接使用纯色填充，节省渲染性能 // Use pure color, save rendering perf
        } else { // 触发亚单元格渲染 // Trigger sub-cell rendering
            // 利用 CSS 线性渐变，实现同一单元格内 [透明 -> 颜色 -> 透明] 的精确截断 // Use linear-gradient for precise cutoff
            return `background: linear-gradient(to right, transparent ${startPct}%, ${barColor} ${startPct}%, ${barColor} ${endPct}%, transparent ${endPct}%);`;
        }
    }

    // 1. 渲染表头 (月合并，周细分) // Render table headers
    function renderTableHeaders() {
        const thead = document.getElementById('gantt-thead'); // 获取 DOM // Get DOM
        
        let trMonth = document.createElement('tr'); // 创建月表头行 // Create month row
        trMonth.innerHTML = `
            <th class="col-phase" rowspan="2">阶段</th>
            <th class="col-milestone" rowspan="2">里程碑</th>
            <th class="col-task" rowspan="2">项目</th>
            <th class="col-type" rowspan="2">TYPE</th>
        `;

        let currentMonth = weeklyGrid[0].month; // 初始化对比游标 // Init comparison cursor
        let monthColspan = 0; // 月份合并计数器 // Month colspan counter
        let monthName = `${weeklyGrid[0].start.getFullYear()}M${String(currentMonth + 1).padStart(2, '0')}`; // 初始化标签 // Init label

        let trWeeks = document.createElement('tr'); // 创建周表头行 // Create week row

        weeklyGrid.forEach((week) => { // 遍历周网格 // Iterate weekly grid
            if (week.month === currentMonth) { // 同月逻辑 // Same month
                monthColspan++; // 跨度 +1 // Increment span
            } else { // 跨月逻辑触发 // Month transition triggered
                let thM = document.createElement('th'); // 新建表头格 // Create TH
                thM.colSpan = monthColspan; // 注入动态跨度 // Inject dynamic colspan
                thM.innerText = monthName; // 写入月份 // Write month text
                trMonth.appendChild(thM); // 挂载节点 // Mount node

                currentMonth = week.month; // 更新游标 // Update cursor
                monthColspan = 1; // 重置跨度 // Reset span
                monthName = `${week.start.getFullYear()}M${String(currentMonth + 1).padStart(2, '0')}`; // 生成新标签 // Gen new label
            }

            let thW = document.createElement('th'); // 生成底层网格 (周标签) // Generate bottom grid (Week labels)
            thW.className = 'time-cell'; // 应用 CSS 宽度限制 // Apply CSS width limit
            thW.innerText = week.label; // 写入 W01 等 // Write W01 etc.
            thW.style.fontSize = "10px"; // 缩小字号 // Shrink font
            thW.style.backgroundColor = "#FCE4D6"; // 橘色高亮背景 // Orange highlight
            thW.style.color = "#000"; // 纯黑文字 // Black text
            trWeeks.appendChild(thW); // 挂载节点 // Mount node
        });

        // 扫尾逻辑：补齐循环结束后的最后一个月 // Cleanup: Add the final month after loop
        let thMLast = document.createElement('th'); // 创建末尾节点 // Create final node
        thMLast.colSpan = monthColspan; // 注入最后计算的跨度 // Inject final span
        thMLast.innerText = monthName; // 写入文字 // Write text
        trMonth.appendChild(thMLast); // 挂载节点 // Mount node

        thead.appendChild(trMonth); // 组装到 DOM 树 // Assemble to DOM
        thead.appendChild(trWeeks); // 组装到 DOM 树 // Assemble to DOM
    }

    // 2. 渲染表体主体 (基于周网格的精确双轨渲染) // Render body
    function renderTableBody() {
        const tbody = document.getElementById('gantt-tbody'); // 获取 DOM // Get DOM
        
        let phaseRowSpans = {}; // 阶段合并映射表 // Phase span map
        let milestoneRowSpans = {}; // 里程碑合并映射表 // Milestone span map
        
        rawData.forEach(item => { // 第一遍遍历：预计算跨行高度 // First pass: pre-calculate row spans
            phaseRowSpans[item.phase] = (phaseRowSpans[item.phase] || 0) + 2; // 乘2代表双行轨 // Multiply by 2 for dual track
            milestoneRowSpans[item.phase + '_' + item.milestone] = (milestoneRowSpans[item.phase + '_' + item.milestone] || 0) + 2; 
        });

        let phaseCount = {}; // 阶段渲染追踪器 // Phase render tracker
        let milestoneCount = {}; // 里程碑渲染追踪器 // Milestone render tracker

        rawData.forEach(item => { // 第二遍遍历：DOM 生成与渲染 // Second pass: DOM gen & render
            const phaseKey = item.phase; // 提取 Key // Extract key
            const msKey = item.phase + '_' + item.milestone; // 提取联合 Key // Extract joint key
            
            // --- 渲染 [计划 Plan] 行 --- // Render Plan row
            let trPlan = document.createElement('tr'); // 创建计划行 // Create plan row
            trPlan.className = 'row-plan'; // 赋予类名 // Assign class
            
            if (!phaseCount[phaseKey]) { // 仅首次出现时执行合并 // Merge only on first appearance
                let tdPhase = document.createElement('td'); // 创建单元格 // Create TD
                tdPhase.rowSpan = phaseRowSpans[phaseKey]; // 注入跨度 // Inject span
                tdPhase.className = 'col-phase'; // 赋予类名 // Assign class
                tdPhase.innerText = item.phase; // 写入文本 // Write text
                trPlan.appendChild(tdPhase); // 挂载 // Mount
                phaseCount[phaseKey] = 1; // 标记为已渲染 // Mark rendered
            }

            if (!milestoneCount[msKey]) { // 里程碑同理 // Milestone logic identical
                let tdMs = document.createElement('td'); // 创建单元格 // Create TD
                tdMs.rowSpan = milestoneRowSpans[msKey]; // 注入跨度 // Inject span
                tdMs.className = 'col-milestone'; // 赋予类名 // Assign class
                tdMs.innerText = item.milestone; // 写入文本 // Write text
                trPlan.appendChild(tdMs); // 挂载 // Mount
                milestoneCount[msKey] = 1; // 标记为已渲染 // Mark rendered
            }

            let tdTask = document.createElement('td'); // 任务名单元格 // Task name TD
            tdTask.rowSpan = 2; // 固定占据两行的高度 // Fixed 2-row span
            tdTask.className = 'col-task'; // 赋予类名 // Assign class
            tdTask.innerText = item.task; // 写入文本 // Write text
            trPlan.appendChild(tdTask); // 挂载 // Mount

            let tdTypeP = document.createElement('td'); // 属性标签单元格 // Type tag TD
            tdTypeP.className = 'col-type'; // 赋予类名 // Assign class
            tdTypeP.innerText = '计划'; // 写入文本 // Write text
            trPlan.appendChild(tdTypeP); // 挂载 // Mount

            weeklyGrid.forEach(week => { // 遍历周网格绘制计划条 // Iterate weekly grid for plan bar
                let td = document.createElement('td'); // 创建单元格 // Create TD
                td.className = 'time-cell'; // 赋予类名 // Assign class
                // 核心：调用亚单元格渲染引擎注入渐变色块 // Core: call sub-cell engine for gradient inject
                td.style = getOverlapStyle(item.planStart, item.planEnd, week, 'var(--color-bar-plan)', false); 
                trPlan.appendChild(td); // 挂载 // Mount
            });
            tbody.appendChild(trPlan); // 将完整计划行压入表体 // Push plan row to body

            // --- 渲染 [实际 Actual] 行 --- // Render Actual row
            let trActual = document.createElement('tr'); // 创建实际行 // Create actual row
            trActual.className = 'row-actual'; // 赋予类名 // Assign class
            
            let tdTypeA = document.createElement('td'); // 属性标签单元格 // Type tag TD
            tdTypeA.className = 'col-type'; // 赋予类名 // Assign class
            tdTypeA.innerText = '实际'; // 写入文本 // Write text
            trActual.appendChild(tdTypeA); // 挂载 // Mount

            weeklyGrid.forEach(week => { // 遍历周网格绘制实际进度条 // Iterate weekly grid for actual bar
                let td = document.createElement('td'); // 创建单元格 // Create TD
                td.className = 'time-cell'; // 赋予类名 // Assign class
                // 动态决断进度条颜色：若未结束则为黄色滞后警告色，否则为绿色安全色 // Dynamic color resolve: yellow if pending, else green
                let barColor = item.actualEnd ? 'var(--color-bar-actual)' : 'var(--color-bar-delay)'; 
                let isActualProgress = item.actualStart && !item.actualEnd; // 判断是否为正在进行中的任务 // Check if ongoing task
                // 核心：调用亚单元格渲染引擎注入渐变色块 // Core: call sub-cell engine for gradient inject
                td.style = getOverlapStyle(item.actualStart, item.actualEnd, week, barColor, isActualProgress);
                trActual.appendChild(td); // 挂载 // Mount
            });
            tbody.appendChild(trActual); // 将完整实际行压入表体 // Push actual row to body
        });
    }

    // 3. 计算并定位红线 (适配周网格系统) // Position Today line adapting to weekly grid
    function positionTodayLine() {
        const todayLine = document.getElementById('today-line'); // 获取红线 DOM // Get red line DOM
        
        // 我们需要知道 TODAY 是整个时间轴的第几天 // We need to know which absolute day is TODAY
        const daysDiff = (TODAY - GANTT_START) / (1000 * 60 * 60 * 24); // 精确计算天数差 // Exact day diff
        
        const leftOffset = 80 + 120 + 160 + 40; // 左侧固定表头的总像素偏移量 // Left offset for fixed headers
        const cellWidth = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--cell-width')); // 动态读取网格宽度 // Read CSS variable
        
        // 绝对像素计算公式：固定偏移 + (总天数 / 7天) * 单元格宽度 // Pixel formula: Offset + (Days/7) * CellWidth
        const targetLeft = leftOffset + (daysDiff / 7) * cellWidth; 
        
        todayLine.style.left = `${targetLeft}px`; // 执行物理级位移定位 // Execute physical positioning
    }

    // 执行渲染主线程 // Execute main rendering thread
    window.onload = function() {
        renderTableHeaders(); // 绘制表头 // Draw headers
        renderTableBody(); // 绘制表体双轨网格 // Draw dual-track grid
        positionTodayLine(); // 绘制贯穿式今日红线 // Draw today line
        
        // 此重构版本宽度极度紧凑，已无需自动滚动，它能完美契合首屏显示！ // Compact layout, auto-scroll no longer needed
    };

</script>

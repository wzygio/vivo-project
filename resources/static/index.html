<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visionox M3 Ultimate Skill Tree</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <canvas id="canvas-interactive"></canvas>

    <div id="scene-container">
        <svg id="svg-lines"></svg>
        <div id="nodes-layer"></div>
        <div id="core-layer"></div>
    </div>

    <div class="header">
        <div class="brand-title">VISIONOX <span class="brand-ver">V3</span></div>
    </div>

    <button id="menu-toggle" onclick="toggleSidebar()">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
        </svg>
    </button>

    <div id="sidebar-overlay" onclick="toggleSidebar()"></div>

    <aside id="sidebar">
        <div class="sb-header">
            <span class="sb-title">北极星报表</span>
            <button class="sb-close" onclick="toggleSidebar()">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>
        </div>

        <div class="sb-content" id="sidebar-nav-container"></div>
    </aside>

    <script src="config.js"></script>
    <script src="script.js"></script>
</body>
</html>
